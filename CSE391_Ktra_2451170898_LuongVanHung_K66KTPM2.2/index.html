<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List</title>
    
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container my-5 app-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="header-title m-0">Task List</h1>
            <button class="btn btn-add-task d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#addTaskModal">
                <i class="fa-solid fa-plus"></i> Add Task
            </button>
        </div>

        <div class="task-list" id="taskListContainer">
            </div>
    </div>

    <div class="modal fade" id="addTaskModal" tabindex="-1" aria-labelledby="addTaskModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-modal">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="addTaskModalLabel">Add Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-4">
                        <label for="taskInput" class="form-label text-muted fw-bold small">Task</label>
                        <input type="text" class="form-control custom-input" id="taskInput" placeholder="Type your task here...">
                    </div>
                    <div>
                        <label class="form-label text-muted fw-bold small">Priority</label>
                        <div class="d-flex gap-3" id="prioritySelector">
                            <button type="button" class="btn priority-select-btn btn-high" data-value="High">High</button>
                            <button type="button" class="btn priority-select-btn btn-medium" data-value="Medium">Medium</button>
                            <button type="button" class="btn priority-select-btn btn-low active" data-value="Low">Low</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-submit-task" id="confirmAddBtn">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
