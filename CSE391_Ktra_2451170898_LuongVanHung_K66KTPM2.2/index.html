<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container my-5 app-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="header-title m-0">Task List</h1>
            <button class="btn btn-add-task d-flex align-items-center gap-2">
                <i class="fa-solid fa-plus"></i> Add Task
            </button>
        </div>

        <div class="task-list">
            
            <div class="card task-card mb-3">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div class="row w-75 align-items-center">
                        <div class="col-4">
                            <span class="task-label">Task</span>
                            <div class="task-title">Go to gym</div>
                        </div>
                        <div class="col-4">
                            <span class="task-label">Priority</span>
                            <div class="task-priority priority-high">High</div>
                        </div>
                        <div class="col-4">
                            <span class="status-badge">To Do</span>
                        </div>
                    </div>
                    <div class="task-actions d-flex gap-4 align-items-center">
                        <i class="fa-regular fa-circle action-icon icon-empty"></i>
                        <i class="fa-regular fa-pen-to-square action-icon icon-edit"></i>
                        <i class="fa-regular fa-trash-can action-icon icon-delete"></i>
                    </div>
                </div>
            </div>

            <div class="card task-card mb-3">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div class="row w-75 align-items-center">
                        <div class="col-4">
                            <span class="task-label">Task</span>
                            <div class="task-title">Read a book</div>
                        </div>
                        <div class="col-4">
                            <span class="task-label">Priority</span>
                            <div class="task-priority priority-low">Low</div>
                        </div>
                        <div class="col-4">
                            <span class="status-badge">Done</span>
                        </div>
                    </div>
                    <div class="task-actions d-flex gap-4 align-items-center">
                        <i class="fa-regular fa-circle action-icon icon-purple"></i>
                        <i class="fa-regular fa-pen-to-square action-icon icon-edit"></i>
                        <i class="fa-regular fa-trash-can action-icon icon-delete"></i>
                    </div>
                </div>
            </div>

            <div class="card task-card mb-3">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div class="row w-75 align-items-center">
                        <div class="col-4">
                            <span class="task-label">Task</span>
                            <div class="task-title">Go to market</div>
                        </div>
                        <div class="col-4">
                            <span class="task-label">Priority</span>
                            <div class="task-priority priority-medium">Medium</div>
                        </div>
                        <div class="col-4">
                            <span class="status-badge">In Progress</span>
                        </div>
                    </div>
                    <div class="task-actions d-flex gap-4 align-items-center">
                        <i class="fa-solid fa-circle-notch action-icon icon-purple"></i>
                        <i class="fa-regular fa-pen-to-square action-icon icon-edit"></i>
                        <i class="fa-regular fa-trash-can action-icon icon-delete"></i>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
